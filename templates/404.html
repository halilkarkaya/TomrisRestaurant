{% load static %}
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#080706">
  <title>Sayfa bulunamadı | Tomris Restoran</title>
  <link rel="icon" href="{% static 'restaurant/images/favicon.svg' %}" type="image/svg+xml">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.5rem;
      background: #080706;
      color: #f0e2c8;
      font-family: "Alegreya Sans", "Segoe UI", Arial, sans-serif;
      line-height: 1.6;
      text-align: center;
    }
    .error-shell { max-width: 34rem; }
    .error-brand {
      margin: 0 0 2.5rem;
      font-family: "Bodoni MT", Didot, Georgia, serif;
      font-size: 1.5rem;
    }
    .error-brand small {
      display: block;
      color: #b78645;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    .error-code {
      margin: 0;
      color: #b78645;
      font-family: "Bodoni MT", Didot, Georgia, serif;
      font-size: clamp(5rem, 18vw, 8rem);
      line-height: 1;
    }
    h1 {
      margin: 1rem 0 0;
      font-family: "Bodoni MT", Didot, Georgia, serif;
      font-size: clamp(1.6rem, 4.5vw, 2.3rem);
      font-weight: 500;
      letter-spacing: -0.02em;
    }
    .error-text { margin: 1rem 0 0; color: #a99a84; }
    .error-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 3.25rem;
      margin-top: 2.25rem;
      padding: 0 1.65rem;
      background: #8f2428;
      color: #fff7eb;
      font-size: 0.77rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-decoration: none;
      text-transform: uppercase;
      transition: background-color 180ms ease;
    }
    .error-button:hover { background: #b7373c; }
  </style>
</head>
<body>
  <main class="error-shell">
    <p class="error-brand">Tomris <small>Restoran</small></p>
    <p class="error-code">404</p>
    <h1>Aradığınız sayfa bulunamadı</h1>
    <p class="error-text">Sayfa kaldırılmış veya adres hatalı yazılmış olabilir. Menümüz ve iletişim bilgilerimiz ana sayfada sizi bekliyor.</p>
    <a class="error-button" href="/">Ana sayfaya dön</a>
  </main>
</body>
</html>
