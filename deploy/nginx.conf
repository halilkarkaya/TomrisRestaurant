server {
    listen 80;
    server_name www.tomrisrestoran.com.tr;
    return 301 https://tomrisrestoran.com.tr$request_uri;
}

server {
    listen 80;
    server_name tomrisrestoran.com.tr;
    client_max_body_size 12M;

    location ^~ /static/ {
        alias /var/www/tomris/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ^~ /media/ {
        alias /var/www/tomris/media/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
