# CloudPanel Vhost Editor'da ilgili HTTPS server blogunun icine ekleyin.
if ($host = www.tomrisrestoran.com.tr) {
    return 301 https://tomrisrestoran.com.tr$request_uri;
}

client_max_body_size 12M;

location ^~ /media/ {
    alias /var/www/tomris/media/;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}
